<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Bars -->
  <rect x="5" y="35" width="10" height="20" rx="2" fill="url(#grad)" />
  <rect x="20" y="28" width="10" height="27" rx="2" fill="url(#grad)" />
  <rect x="35" y="20" width="10" height="35" rx="2" fill="url(#grad)" />
  <rect x="50" y="10" width="10" height="45" rx="2" fill="url(#grad)" />

  <!-- Arrow -->
  <path d="M5 40 C20 25, 35 20, 60 8" stroke="url(#grad)" stroke-width="3" fill="none"/>
  <polygon points="60,8 55,10 58,3" fill="#6366F1"/>

  <!-- Text - uses currentColor to adapt to theme -->
  <text x="75" y="40" font-family="Inter, sans-serif" font-size="28" fill="currentColor">
    growth<tspan fill="#6366F1">OS</tspan>
  </text>
</svg>
